<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Robot Bridge Network Debug</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f7f8;
      color: #172026;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
    }

    main {
      width: min(760px, 100%);
    }

    h1 {
      margin: 0 0 16px;
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .panel {
      background: #ffffff;
      border: 1px solid #d8e0e4;
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 12px 28px rgba(23, 32, 38, 0.08);
    }

    label {
      display: block;
      margin: 14px 0 6px;
      font-size: 13px;
      font-weight: 700;
      color: #3b4b55;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #b9c6cc;
      border-radius: 6px;
      padding: 12px;
      font: inherit;
      background: #ffffff;
      color: #172026;
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }

    button {
      border: 0;
      border-radius: 6px;
      padding: 11px 14px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      background: #176b87;
      color: #ffffff;
    }

    button.secondary {
      background: #e3ebef;
      color: #172026;
    }

    pre {
      min-height: 220px;
      max-height: 48vh;
      overflow: auto;
      box-sizing: border-box;
      margin: 16px 0 0;
      padding: 12px;
      border-radius: 6px;
      background: #11181c;
      color: #d9f7e7;
      white-space: pre-wrap;
      font-size: 13px;
      line-height: 1.45;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        background: #12181c;
        color: #edf3f5;
      }

      .panel {
        background: #182126;
        border-color: #314149;
      }

      label {
        color: #c7d2d8;
      }

      input {
        background: #10161a;
        color: #edf3f5;
        border-color: #465961;
      }

      button.secondary {
        background: #33444c;
        color: #edf3f5;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>Robot Bridge Network Debug</h1>
    <section class="panel">
      <label for="wsUrl">WebSocket URL</label>
      <input id="wsUrl" value="wss://YOUR-QUICKTUNNEL.trycloudflare.com" autocomplete="off">

      <label for="message">Message</label>
      <input id="message" value="hello from github pages" autocomplete="off">

      <div class="row">
        <button type="button" id="connectBtn">Connect</button>
        <button type="button" id="sendBtn">Send</button>
        <button type="button" class="secondary" id="closeBtn">Close</button>
        <button type="button" class="secondary" id="clearBtn">Clear</button>
      </div>

      <pre id="log"></pre>
    </section>
  </main>

  <script>
    const wsUrl = document.getElementById('wsUrl');
    const message = document.getElementById('message');
    const logEl = document.getElementById('log');
    let socket = null;

    const savedUrl = localStorage.getItem('robotDebugWsUrl');
    if (savedUrl) {
      wsUrl.value = savedUrl;
    }

    function log(line) {
      const time = new Date().toLocaleTimeString();
      logEl.textContent += `[${time}] ${line}\n`;
      logEl.scrollTop = logEl.scrollHeight;
    }

    function connect() {
      const target = wsUrl.value.trim();
      if (!/^wss?:\/\//.test(target)) {
        log('error: ws:// 또는 wss:// 주소를 입력하세요');
        return;
      }

      localStorage.setItem('robotDebugWsUrl', target);

      if (socket) {
        socket.close();
      }

      log(`connecting: ${target}`);
      socket = new WebSocket(target);
      socket.onopen = () => log('connected');
      socket.onmessage = (event) => log(`received: ${event.data}`);
      socket.onerror = () => log('error: browser WebSocket error');
      socket.onclose = (event) => log(`closed: code=${event.code} reason=${event.reason || '(empty)'}`);
    }

    function send() {
      if (!socket || socket.readyState !== WebSocket.OPEN) {
        log('not connected');
        return;
      }

      socket.send(message.value);
      log(`sent: ${message.value}`);
    }

    document.getElementById('connectBtn').addEventListener('click', connect);
    document.getElementById('sendBtn').addEventListener('click', send);
    document.getElementById('closeBtn').addEventListener('click', () => {
      if (socket) {
        socket.close();
      }
    });
    document.getElementById('clearBtn').addEventListener('click', () => {
      logEl.textContent = '';
    });

    message.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        send();
      }
    });
  </script>
</body>
</html>
